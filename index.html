<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Card cookies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <style>
      .card {
        margin: 70px;
      }
      .card-cookie {
        background-color: #525252;
        width: 100%;
        max-width: max-content;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
      }
      .card-cookie i {
        color: #ffffff;
        font-size: 70px;
      }
    </style>
  </head>
  <body>
    <div class="card card-cookie">
      <div class="card-body">
        <i class="bi bi-cookie"></i>
        <h5 class="card-title text-white">We use cookies to improve your experience.</h5>
        <button type="button" class="btn btn-light fw-bold mt-3" id="acceptCookie">I like cookies</button>
      </div>
    </div>

    <div class="card" aria-hidden="true">
      <div class="card-body">
        <h5 class="card-title placeholder-glow">
          <span class="placeholder col-6"></span>
        </h5>
        <p class="card-text placeholder-glow">
          <span class="placeholder col-7"></span>
          <span class="placeholder col-4"></span>
          <span class="placeholder col-4"></span>
          <span class="placeholder col-6"></span>
          <span class="placeholder col-8"></span>
        </p>
        <a class="btn btn-primary disabled placeholder col-6" aria-disabled="true"></a>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const card = document.querySelector(".card-cookie");
        const btn = document.getElementById("acceptCookie");

        const consent = localStorage.getItem("cookies");
        if (!consent) {
          card.style.display = "block";
        } else {
          card.style.display = "none";
        }

        btn.addEventListener("click", () => {
          localStorage.setItem("cookies", "accepted");
          card.style.display = "none";
        });
      });
    </script>

  </body>
</html>
